<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원내 외용제 통합 관리 시스템 v3.0</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f1f3f5;
            --white: #ffffff;
            --green: #27ae60;
            --purple: #9b59b6;
            --orange: #e67e22;
        }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--primary); margin: 0; padding: 15px; line-height: 1.5; }
        .container { max-width: 1000px; margin: 0 auto; background: var(--white); padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); }
        h1 { text-align: center; font-size: 1.4rem; margin-bottom: 25px; }

        /* 메인 탭 */
        .main-tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; font-weight: bold; font-size: 1rem; color: #95a5a6; transition: 0.2s; }
        .tab-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        /* 필터 버튼 */
        .filter-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; padding: 10px; background: #f8f9fa; border-radius: 8px; }
        .filter-btn { padding: 6px 12px; border: 1px solid #ddd; border-radius: 20px; background: white; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 테이블 스타일 */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; font-size: 0.9rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.85rem; vertical-align: top; line-height: 1.65; }
        #inventory-list td:last-child { max-width: 420px; color: #444; }

        /* 뱃지 */
        .badge { padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; color: white; display: inline-block; margin-bottom: 4px; }
        .bg-st  { background: #e67e22; }
        .bg-ab  { background: #3498db; }
        .bg-fg  { background: #27ae60; }
        .bg-av  { background: #9b59b6; }
        .bg-etc { background: #7f8c8d; }

        /* 복사 버튼 */
        .code-wrap { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .copy-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 2px 7px; font-size: 0.72rem; font-weight: bold;
            border: 1.5px solid #3498db; border-radius: 4px;
            background: white; color: #3498db; cursor: pointer;
            transition: all 0.15s; white-space: nowrap; line-height: 1.6;
        }
        .copy-btn:hover { background: #3498db; color: white; }
        .copy-btn.copied { background: #27ae60; border-color: #27ae60; color: white; }

        /* 섹션 전환 */
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ===== 스마트 추천 영역 ===== */
        .step-container { background: #f8f9fa; padding: 20px; border-radius: 10px; min-height: 280px; }
        .question-text { font-size: 1.05rem; font-weight: 700; margin: 0 0 18px; color: var(--primary); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn {
            padding: 15px;
            border: 1.5px solid #dee2e6;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: left;
            font-size: 0.92rem;
            color: var(--primary);
            transition: border-color 0.2s, background 0.2s;
            line-height: 1.5;
        }
        .opt-btn:hover { border-color: var(--accent); background: #f0f8ff; }

        /* 결과 박스 */
        #result-display {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            background: #eef7ff;
            border-left: 6px solid var(--accent);
            animation: fadeIn 0.3s;
        }
        .res-code { font-weight: 800; color: var(--accent); font-size: 1.2rem; }
        .res-info { margin-top: 10px; font-size: 0.95rem; color: #444; line-height: 1.8; }
        .res-badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; color: white; margin-left: 6px; vertical-align: middle; }

        .reset-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            border: none;
            background: #dee2e6;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            transition: background 0.2s;
        }
        .reset-btn:hover { background: #ccd0d5; }

        .step-hidden { display: none; }

        @media (max-width: 520px) {
            .btn-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏥 원내 외용제 관리 가이드 (v3.0)</h1>

    <div class="main-tabs">
        <button class="tab-btn active" onclick="switchMainTab('review', this)">📋 카테고리별 리뷰</button>
        <button class="tab-btn" onclick="switchMainTab('recommend', this)">🔍 증상별 추천</button>
    </div>

    <!-- ===== 카테고리별 리뷰 ===== -->
    <div id="section-review" class="section active">
        <div class="filter-group">
            <button class="filter-btn active" onclick="filterData('all', this)">전체</button>
            <button class="filter-btn" onclick="filterData('st', this)">스테로이드</button>
            <button class="filter-btn" onclick="filterData('ab', this)">항생제</button>
            <button class="filter-btn" onclick="filterData('fg', this)">항진균/기생충</button>
            <button class="filter-btn" onclick="filterData('av', this)">항바이러스</button>
            <button class="filter-btn" onclick="filterData('etc', this)">재생/기타</button>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>코드 / 품목명</th>
                        <th>구분 / 성분</th>
                        <th>적응증 및 특징</th>
                    </tr>
                </thead>
                <tbody id="inventory-list"></tbody>
            </table>
        </div>
    </div>

    <!-- ===== 증상별 추천 ===== -->
    <div id="section-recommend" class="section">
        <div class="step-container">

            <!-- Step 1: 대분류 -->
            <div id="step1">
                <p class="question-text">Q. 어떤 증상으로 내원하셨나요?</p>
                <div class="btn-grid">
                    <button class="opt-btn" onclick="goStep('step-inf')">🔴 가려움 / 습진<br><small style="color:#888">스테로이드 계열</small></button>
                    <button class="opt-btn" onclick="goStep('step-fg')">🍄 무좀 / 진균 / 기생충<br><small style="color:#888">항진균·항기생충제</small></button>
                    <button class="opt-btn" onclick="goStep('step-ab')">🩹 상처 / 고름 / 화상<br><small style="color:#888">항생제 계열</small></button>
                    <button class="opt-btn" onclick="goStep('step-etc')">✨ 재생 / 보습 / 바이러스<br><small style="color:#888">재생제·항바이러스</small></button>
                </div>
            </div>

            <!-- Step 2-A: 염증/습진 -->
            <div id="step-inf" class="step-hidden">
                <p class="question-text">Q. 어느 부위에 사용하시나요?</p>
                <div class="btn-grid">
                    <button class="opt-btn" onclick="finish('L-DES1')">👶 얼굴 / 소아 / 민감 부위<br><small style="color:#888">약한 강도 권장</small></button>
                    <button class="opt-btn" onclick="finish('CR-LIDO')">🌿 가벼운 습진 / 땀띠<br><small style="color:#888">중약 강도</small></button>
                    <button class="opt-btn" onclick="finish('O-ADVA')">💪 일반 몸통 / 팔다리<br><small style="color:#888">일반 강도</small></button>
                    <button class="opt-btn" onclick="finish('O-BETA')">🦶 손발바닥 / 두꺼운 만성<br><small style="color:#888">강한 강도</small></button>
                </div>
                <button class="reset-btn" style="margin-top:12px; background:#f0f0f0; width:auto; padding:8px 16px;" onclick="goStep('step1')">← 이전</button>
            </div>

            <!-- Step 2-B: 진균/기생충 -->
            <div id="step-fg" class="step-hidden">
                <p class="question-text">Q. 세부 증상을 선택하세요.</p>
                <div class="btn-grid">
                    <button class="opt-btn" onclick="finish('CR-MUJO')">🦶 일반 무좀 / 완선<br><small style="color:#888">단일 항진균제</small></button>
                    <button class="opt-btn" onclick="finish('CR-EZNT')">🔥 염증 동반 무좀<br><small style="color:#888">진균+스테로이드 복합</small></button>
                    <button class="opt-btn" onclick="finish('L-JUBL')">💅 손발톱 무좀<br><small style="color:#888">전용 외용액</small></button>
                    <button class="opt-btn" onclick="finish('L-LOPX')">💈 손발톱 무좀 (대안)<br><small style="color:#888">네일라카 형태</small></button>
                    <button class="opt-btn" onclick="finish('L-NZR2')">🚿 비듬 / 지루성 피부염<br><small style="color:#888">샴푸형</small></button>
                    <button class="opt-btn" onclick="finish('CR-PERM')">🕷️ 옴 (Scabies)<br><small style="color:#888">기생충 감염</small></button>
                </div>
                <button class="reset-btn" style="margin-top:12px; background:#f0f0f0; width:auto; padding:8px 16px;" onclick="goStep('step1')">← 이전</button>
            </div>

            <!-- Step 2-C: 항생제/상처 -->
            <div id="step-ab" class="step-hidden">
                <p class="question-text">Q. 상처의 상태는 어떠한가요?</p>
                <div class="btn-grid">
                    <button class="opt-btn" onclick="finish('O-ESR')">💊 고름 / 농가진 / 일반 세균 감염<br><small style="color:#888">국소 항생제</small></button>
                    <button class="opt-btn" onclick="finish('O-SIL20')">🔥 화상 부위 감염 예방<br><small style="color:#888">실버 설파다이아진</small></button>
                    <button class="opt-btn" onclick="finish('O-MDCN')">🩹 일반 상처 재생 + 감염 예방<br><small style="color:#888">복합 재생제</small></button>
                    <button class="opt-btn" onclick="finish('CR-LAVEN')">⚡ 세균/진균 복합 감염 의심<br><small style="color:#888">3중 복합제</small></button>
                </div>
                <button class="reset-btn" style="margin-top:12px; background:#f0f0f0; width:auto; padding:8px 16px;" onclick="goStep('step1')">← 이전</button>
            </div>

            <!-- Step 2-D: 재생/기타 -->
            <div id="step-etc" class="step-hidden">
                <p class="question-text">Q. 세부 목적을 선택하세요.</p>
                <div class="btn-grid">
                    <button class="opt-btn" onclick="finish('O-BEPAN')">🍼 기저귀 발진 / 보습<br><small style="color:#888">스테로이드 無</small></button>
                    <button class="opt-btn" onclick="finish('O-MDCN')">🩹 상처 재생 / 흉터 예방<br><small style="color:#888">마데카솔 케어</small></button>
                    <button class="opt-btn" onclick="finish('O-EGF')">⭐ 고도 재생 (냉장 보관)<br><small style="color:#888">EGF 성장인자</small></button>
                    <button class="opt-btn" onclick="finish('CR-VIVIR')">💊 단순포진 / 입술 물집<br><small style="color:#888">항바이러스</small></button>
                    <button class="opt-btn" onclick="finish('L-PRT')">🩸 구내염 / 지혈<br><small style="color:#888">페리터치 액</small></button>
                </div>
                <button class="reset-btn" style="margin-top:12px; background:#f0f0f0; width:auto; padding:8px 16px;" onclick="goStep('step1')">← 이전</button>
            </div>

            <!-- 결과 -->
            <div id="result-display">
                <div id="final-content"></div>
                <button class="reset-btn" onclick="resetRec()">🔄 다시 선택하기</button>
            </div>

        </div>
    </div>
</div>

<script>
    const inventory = [
        // 스테로이드 및 복합제
        {
            cat: 'st', code: 'CR-EZNT', name: '에코론 크림', comp: 'Econazole + Triamcinolone', grade: 'Class 4',
            note: '항진균제(Econazole)와 중등도 스테로이드(Triamcinolone)의 복합제. 무좀·완선에 염증이 동반될 때 1차 선택. 단순 스테로이드만 사용 시 진균이 오히려 증식할 수 있으므로 진균 감염이 의심되면 반드시 이 복합제를 사용. 1일 2회 도포, 2~4주 사용.'
        },
        {
            cat: 'st', code: 'CR-LAVEN', name: '라벤다 크림', comp: 'Betamethasone + Clotrimazole + Gentamicin', grade: 'Class 3',
            note: '스테로이드(강)+항진균제+항생제의 3중 복합제. 세균·진균 혼합 감염이 의심되는 습진, 지간(발가락 사이) 감염, 2차 감염된 아토피에 적합. 강효 스테로이드 포함이므로 안면·사타구니·겨드랑이에는 사용 주의. 1일 2~3회, 2주 이내 단기 사용 권장.'
        },
        {
            cat: 'st', code: 'CR-LIDO', name: '리도멕스 크림', comp: 'Prednisolone valeroacetate', grade: 'Class 5',
            note: '약효가 순한 편(Class 5)으로 영유아 및 안면 습진의 1차 선택제. 땀띠, 가벼운 접촉성 피부염, 기저귀 피부염에 적합. 성인 기준 1일 2회 도포. 소아·안면에 단기(1~2주) 사용 시 안전성 우수. 스테로이드 처음 경험하는 환자에게도 부담이 적음.'
        },
        {
            cat: 'st', code: 'L-DES1', name: '데스원 로션', comp: 'Desonide 0.05%', grade: 'Class 6',
            note: '가장 약한 축에 속하는 저강도 스테로이드(Class 6). 로션 제형으로 두피·안면·사타구니·넓은 부위에 발림성 우수. 영아 지루성 피부염(요람머리), 아토피 초기 관리에 적합. 비불소화(non-fluorinated) 성분으로 피부 위축 부작용이 적어 소아 장기 사용 시 상대적으로 안전.'
        },
        {
            cat: 'st', code: 'O-ADVA', name: '아드반탄 연고', comp: 'Methylprednisolone aceponate', grade: 'Class 4',
            note: '중등도 스테로이드(Class 4)로 일상적 습진·아토피 치료의 표준. 연고 제형으로 건조한 피부에 보습 효과도 있음. 성인 사지·체간의 습진·접촉피부염·결절성양진에 1일 1회 도포로 충분. 장기 사용 시 피부 위축 주의, 안면 사용 2주 이내 권장.'
        },
        {
            cat: 'st', code: 'O-BETA', name: '베타베이트 연고', comp: 'Clobetasol propionate 0.05%', grade: 'Class 1',
            note: '최강력(Class 1) 스테로이드. 만성 태선화, 건선, 수포성 피부질환, 손발바닥 두꺼운 습진 등 난치성 병변에 사용. 1일 1~2회, 연속 2주 초과 사용 금지. 장기·광범위 사용 시 HPA축 억제·피부 위축·모세혈관 확장 등 전신 부작용 위험. 안면·사타구니·겨드랑이 사용 절대 금지.'
        },
        // 항생제
        {
            cat: 'ab', code: 'O-ESR', name: '에스로반', comp: 'Mupirocin 20mg/g', grade: '-',
            note: 'MRSA를 포함한 그람양성균에 탁월한 국소 항생제. 농가진·모낭염·2차 감염 상처의 1차 선택. 1일 2~3회 도포, 최대 10일. 전신 항생제 없이도 표재성 피부 감염 치료 가능. 점막·코 안 MRSA 제균에도 사용. 눈·내부 사용 금지.'
        },
        {
            cat: 'ab', code: 'O-SIL20', name: '실마진 1% 크림', comp: 'Silver sulfadiazine 10mg/g', grade: '-',
            note: '2도 이상 화상 창상의 표준 드레싱 항균제. 은(Ag) 이온이 서방 방출되어 녹농균·대장균 등 광범위 균종에 항균 효과 발휘. 1일 1~2회 두껍게 도포 후 거즈 덮기. 신생아·임산부·설파 알레르기 환자는 사용 금지. 장기 사용 시 은 축적(argyria) 및 백혈구 감소 모니터링.'
        },
        // 항진균 / 항기생충
        {
            cat: 'fg', code: 'CR-MUJO', name: '무조날 크림', comp: 'Terbinafine HCl 10mg/g', grade: '-',
            note: '알릴아민 계열 항진균제로 피부사상균(무좀균)에 살균 작용. 족부무좀(지간형·소수포형)·완선(사타구니 무좀)에 단독 사용 시 4주 치료로 높은 완치율. 염증이 없는 단순 무좀 1차 선택. 1일 1~2회 도포. 염증 동반 시 에코론 크림으로 교체.'
        },
        {
            cat: 'fg', code: 'CANES-P', name: '카네스텐 산제', comp: 'Clotrimazole 10mg/g (파우더)', grade: '-',
            note: '파우더(분말) 제형의 항진균제. 진물·삼출물이 있는 습한 무좀(지간형), 땀이 많은 부위에 이상적. 습기를 흡수해 환경 자체를 건조하게 만들어 진균 재감염 예방. 신발 안에 뿌려 환경 제균도 가능. 크림 제형 사용이 불편한 경우 대안.'
        },
        {
            cat: 'fg', code: 'CR-PERM', name: '신신 퍼메트린', comp: 'Permethrin 50mg/g', grade: '-',
            note: '옴(Scabies) 진드기 치료의 1차 선택제. 목 아래 전신(얼굴 제외)에 취침 전 도포 후 8~14시간 뒤 세척. 1회 치료 원칙이나 1주 후 재도포 가능. 동거 가족 동시 치료 필수, 의류·침구류 고온 세탁 병행. 2개월 미만 영아 및 임산부 사용 주의.'
        },
        {
            cat: 'fg', code: 'L-JUBL', name: '주블리아 외용액', comp: 'Efinaconazole 10%', grade: '-',
            note: '손발톱 무좀(조갑진균증) 전용 외용액. 트리아졸 계열로 기존 ciclopirox 대비 침투력 우수. 1일 1회 손발톱 전체와 주변 피부에 도포, 48주 치료 필요. 수분에 강해 목욕 직후에도 효과 유지. 경구 항진균제 복용이 어려운 경우(간 기능 저하, 약물 상호작용) 대안.'
        },
        {
            cat: 'fg', code: 'L-NZR2', name: '니조랄 2% 액', comp: 'Ketoconazole 20mg/mL', grade: '-',
            note: '비듬·지루성 피부염의 원인균(말라세지아)에 효과적인 샴푸형 항진균제. 주 2회 사용, 3~4분 두피에 방치 후 세척. 두피뿐 아니라 얼굴·체간 지루성 피부염에도 거품 내어 도포 가능. 유지기에는 주 1회로 감량. 경구 케토코나졸과 달리 국소 사용 시 전신 흡수 미미.'
        },
        {
            cat: 'fg', code: 'L-LOPX', name: '로푸록스 네일라카', comp: 'Ciclopirox 80mg/g', grade: '-',
            note: '네일라카(매니큐어) 제형의 손발톱 무좀 치료제. 매일 도포하여 손톱 6개월·발톱 9~12개월 치료 필요. 진균 세포막 및 효소 기능을 다중 차단. 주 1회 아세톤으로 제거 후 재도포. 주블리아 대비 비용 저렴, 경증~중등도 조갑진균증에 적합.'
        },
        // 항바이러스
        {
            cat: 'av', code: 'CR-VIVIR', name: '바이버 크림', comp: 'Acyclovir 50mg/g', grade: '-',
            note: 'HSV-1 단순포진(입술 물집·구순 헤르페스) 초기 치료제. 증상 발현 후 가능한 빨리(수포 전 단계) 사용 시 효과 극대화. 1일 5회(4시간마다), 5일 연속 도포. 재발 억제 효과는 없으며 증상 기간 단축이 목적. 성기 헤르페스에는 별도 처방 필요.'
        },
        // 재생 및 기타
        {
            cat: 'etc', code: 'L-PRT', name: '페리터치 액', comp: 'Policresulen (36%)', grade: '-',
            note: '강산성 수렴·지혈·살균제. 구내염 궤양에 면봉으로 소량 접촉 시 즉각적 지혈·통증 감소 효과. 자궁경부·외음부 미란 치료에도 사용. 작용 직후 극심한 통증이 일시적으로 나타날 수 있음을 환자에게 사전 안내 필요. 눈·점막 내부 광범위 접촉 금지.'
        },
        {
            cat: 'etc', code: 'O-MDCN', name: '마데카솔 케어', comp: 'Centella asiatica + Neomycin', grade: '-',
            note: '병풀(Centella) 추출물이 콜라겐 합성을 촉진해 상처 재생을 돕고, Neomycin이 2차 감염을 예방하는 복합 재생제. 절상·찰과상·수술 후 상처의 흉터 최소화에 적합. 화상에는 실마진이 우선. 드레싱 교체 시마다 도포. 감염 징후(발적·고름) 시 항생제 연고로 전환.'
        },
        {
            cat: 'etc', code: 'O-BEPAN', name: '비판텐 연고', comp: 'Dexpanthenol 50mg/g', grade: '-',
            note: '프로비타민 B5 계열의 순수 보습·재생 연고. 스테로이드·항생제 성분 없어 영아 기저귀 발진·신생아 배꼽 관리에 안전하게 사용 가능. 건조하고 민감한 피부 보습, 가벼운 화상·햇볕 화상 진정에도 활용. 임산부도 사용 가능. 부작용 우려 없이 장기 사용 가능한 가장 순한 외용제.'
        },
        {
            cat: 'etc', code: 'O-EGF', name: '이지에프 연고', comp: 'Human EGF (rhEGF) 10μg/g', grade: '-',
            note: '표피 성장인자(EGF)가 세포 분열을 촉진해 만성 창상·욕창·당뇨 족부 궤양 등 난치성 상처의 재생을 가속. 일반 상처 대비 고도 재생이 필요한 경우 사용. 2~8℃ 냉장 보관 필수 (실온 방치 시 단백질 변성). 감염 창상에는 먼저 항생제 치료 후 적용. 보험 급여 기준 확인 필요.'
        }
    ];

    const typeMap = {
        'st':  { label: '스테로이드',   cls: 'bg-st'  },
        'ab':  { label: '항생제',       cls: 'bg-ab'  },
        'fg':  { label: '진균/기생충',  cls: 'bg-fg'  },
        'av':  { label: '항바이러스',   cls: 'bg-av'  },
        'etc': { label: '재생/기타',    cls: 'bg-etc' }
    };

    /* ── 카테고리 리뷰 ── */
    function renderList(data) {
        document.getElementById('inventory-list').innerHTML = data.map(item => `
            <tr>
                <td>
                    <div class="code-wrap">
                        <strong>${item.code}</strong>
                        <button class="copy-btn" onclick="copyCode(this, '${item.code}')" title="코드 복사">📋 복사</button>
                    </div>
                    ${item.name}
                </td>
                <td>
                    <span class="badge ${typeMap[item.cat].cls}">${typeMap[item.cat].label}</span><br>
                    <small>${item.comp}</small>
                    ${item.grade !== '-' ? `<br><small>(${item.grade})</small>` : ''}
                </td>
                <td>${item.note}</td>
            </tr>
        `).join('');
    }

    function copyCode(btn, code) {
        navigator.clipboard.writeText(code).then(() => {
            btn.textContent = '✅ 복사됨';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = '📋 복사';
                btn.classList.remove('copied');
            }, 1500);
        });
    }

    function filterData(category, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderList(category === 'all' ? inventory : inventory.filter(i => i.cat === category));
    }

    /* ── 메인 탭 ── */
    function switchMainTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('section-' + id).classList.add('active');
        btn.classList.add('active');
    }

    /* ── 증상별 추천 ── */
    function goStep(targetId) {
        document.querySelectorAll('.step-container > div').forEach(el => {
            el.style.display = 'none';
        });
        document.getElementById('result-display').style.display = 'none';
        document.getElementById(targetId).style.display = 'block';
    }

    function finish(code) {
        const item = inventory.find(i => i.code === code);
        document.querySelectorAll('.step-container > div').forEach(el => el.style.display = 'none');

        const resBox = document.getElementById('result-display');
        const t = typeMap[item.cat];
        document.getElementById('final-content').innerHTML = `
            <div class="res-code">
                ${item.name} <span style="font-size:0.9rem; color:#888;">(${item.code})</span>
                <span class="res-badge ${t.cls}">${t.label}</span>
            </div>
            <div class="res-info">
                <strong>성분:</strong> ${item.comp}${item.grade !== '-' ? ` &nbsp;·&nbsp; <strong>등급:</strong> ${item.grade}` : ''}<br>
                <strong>적응증:</strong> ${item.note}
            </div>
        `;
        resBox.style.display = 'block';
    }

    function resetRec() {
        document.getElementById('result-display').style.display = 'none';
        document.querySelectorAll('.step-container > div').forEach(el => el.style.display = 'none');
        document.getElementById('step1').style.display = 'block';
    }

    /* ── 초기화 ── */
    renderList(inventory);
    document.getElementById('step1').style.display = 'block';
</script>
</body>
</html>

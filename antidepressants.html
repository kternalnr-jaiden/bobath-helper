<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>항우울제 임상 참조 — 하남보바스병원</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f1f5f9; --surface:#fff; --surface2:#f8fafc; --surface3:#eef2f7;
  --border:#e2e8f0; --border-strong:#cbd5e1;
  --accent:#0284c7; --accent-dim:rgba(2,132,199,0.08); --accent-light:rgba(2,132,199,0.13);
  --text:#0f172a; --text-muted:#64748b; --text-soft:#475569;
  --danger:#dc2626; --danger-dim:rgba(220,38,38,0.08);
  --warn:#d97706; --warn-dim:rgba(217,119,6,0.09);
  --ok:#16a34a; --ok-dim:rgba(22,163,74,0.09);
  --ssri:#0284c7; --snri:#7c3aed; --tca:#e11d48; --other:#ea580c; --guide:#0f766e;
  --r:12px; --sh:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --sh2:0 4px 12px rgba(0,0,0,0.07),0 2px 4px rgba(0,0,0,0.04);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.65;min-height:100vh;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px 12px;position:sticky;top:0;z-index:100;box-shadow:var(--sh);}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.home-btn{display:inline-flex;align-items:center;gap:4px;background:var(--surface3);border:1px solid var(--border);color:var(--text-muted);font-size:11.5px;font-weight:600;padding:5px 10px;border-radius:8px;text-decoration:none;transition:all .18s;flex-shrink:0;font-family:'Noto Sans KR',sans-serif;}
.home-btn:hover{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.header-brand{flex:1;min-width:0;}
.header-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:900;letter-spacing:-.5px;color:var(--text);line-height:1.2;}
.header-title span{color:var(--accent);}
.header-sub{font-size:10px;color:var(--text-muted);letter-spacing:.4px;text-transform:uppercase;margin-top:2px;}
.drug-count-badge{background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);font-family:'JetBrains Mono',monospace;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:700;flex-shrink:0;}
.search-wrap{position:relative;margin-bottom:9px;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;font-size:13px;}
#searchInput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:8px 11px 8px 32px;outline:none;transition:border-color .18s,box-shadow .18s;}
#searchInput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(2,132,199,.1);}
#searchInput::placeholder{color:var(--text-muted);}
.class-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.class-tabs::-webkit-scrollbar{display:none;}
.tab-btn{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);color:var(--text-muted);font-family:'Noto Sans KR',sans-serif;font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:7px;cursor:pointer;transition:all .18s;white-space:nowrap;}
.tab-btn:hover{border-color:var(--accent);color:var(--accent);}
.tab-btn.active[data-class="ALL"]{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.tab-btn.active[data-class="SSRI"]{background:rgba(2,132,199,.12);border-color:var(--ssri);color:var(--ssri);}
.tab-btn.active[data-class="SNRI"]{background:rgba(124,58,237,.1);border-color:var(--snri);color:var(--snri);}
.tab-btn.active[data-class="TCA"]{background:rgba(225,29,72,.09);border-color:var(--tca);color:var(--tca);}
.tab-btn.active[data-class="기타"]{background:rgba(234,88,12,.09);border-color:var(--other);color:var(--other);}
.tab-btn.active[data-class="가이드"]{background:rgba(15,118,110,.1);border-color:var(--guide);color:var(--guide);}
.tab-btn[data-class="가이드"]{border-color:rgba(15,118,110,.35);color:var(--guide);}

/* MAIN */
main{padding:13px 15px 28px;max-width:920px;margin:0 auto;}

/* DRUG CARD */
.drug-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden;box-shadow:var(--sh);transition:box-shadow .2s,border-color .2s;}
.drug-card:hover,.drug-card.open{box-shadow:var(--sh2);border-color:var(--border-strong);}
.drug-card[data-class="SSRI"] .bar{background:var(--ssri);}
.drug-card[data-class="SNRI"] .bar{background:var(--snri);}
.drug-card[data-class="TCA"]  .bar{background:var(--tca);}
.drug-card[data-class="기타"] .bar{background:var(--other);}
.bar{height:3px;}
.card-header{display:flex;align-items:center;padding:12px 14px;cursor:pointer;gap:10px;user-select:none;}
.cls-badge{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;flex-shrink:0;}
.badge-SSRI{background:rgba(2,132,199,.12);color:var(--ssri);}
.badge-SNRI{background:rgba(124,58,237,.12);color:var(--snri);}
.badge-TCA {background:rgba(225,29,72,.12);color:var(--tca);}
.badge-기타{background:rgba(234,88,12,.12);color:var(--other);}
.card-names{flex:1;min-width:0;}
.kor{font-size:14px;font-weight:700;color:var(--text);}
.eng{font-size:10.5px;color:var(--text-muted);font-family:'JetBrains Mono',monospace;margin-top:1px;}
.meta-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:4px;}
.brand{font-size:10.5px;color:var(--text-muted);}

/* header code pills */
.hcp{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(2,132,199,.1);color:var(--accent);border:1px solid rgba(2,132,199,.27);cursor:pointer;transition:all .15s;user-select:none;display:inline-flex;align-items:center;gap:2px;}
.hcp::after{content:'⎘';font-size:9px;opacity:.45;}
.hcp:hover{background:var(--accent);color:#fff;border-color:var(--accent);transform:translateY(-1px);box-shadow:0 2px 5px rgba(2,132,199,.3);}
.hcp:hover::after{opacity:1;}
.hcp.hcp-new{background:rgba(22,163,74,.1);color:var(--ok);border-color:rgba(22,163,74,.28);}
.hcp.hcp-new:hover{background:var(--ok);color:#fff;border-color:var(--ok);}
.hcp.hcp-oos{opacity:.55;text-decoration:line-through;background:var(--danger-dim);color:var(--danger);border-color:rgba(220,38,38,.22);}
.hcp.flash{background:var(--ok)!important;color:#fff!important;border-color:var(--ok)!important;}
.hcp.flash::after{content:'✓'!important;opacity:1;}

.card-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ekgb{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace;white-space:nowrap;}
.ekg-low{background:var(--ok-dim);color:var(--ok);border:1px solid rgba(22,163,74,.25);}
.ekg-mod{background:var(--warn-dim);color:var(--warn);border:1px solid rgba(217,119,6,.25);}
.ekg-high{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(220,38,38,.25);}
.chev{color:var(--text-muted);font-size:11px;transition:transform .22s;flex-shrink:0;}
.drug-card.open .chev{transform:rotate(90deg);}

/* card body */
.card-body{display:none;border-top:1px solid var(--border);}
.drug-card.open .card-body{display:block;}

/* inner tabs */
.itabs{display:flex;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;background:var(--surface2);}
.itabs::-webkit-scrollbar{display:none;}
.itab{flex-shrink:0;padding:8px 13px;font-size:11.5px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;font-weight:500;}
.itab:hover{color:var(--text-soft);}
.itab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700;background:var(--surface);}
.ipanel{display:none;padding:14px;}
.ipanel.active{display:block;}

/* pros/cons */
.pc{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;}
@media(max-width:500px){.pc{grid-template-columns:1fr;}}
.pros,.cons{background:var(--surface2);border-radius:9px;padding:11px;}
.pros{border-left:3px solid var(--ok);}
.cons{border-left:3px solid var(--danger);}
.btitle{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.pros .btitle{color:var(--ok);}
.cons .btitle{color:var(--danger);}
.blist{list-style:none;}
.blist li{font-size:12px;color:var(--text-soft);padding:2px 0 2px 13px;position:relative;}
.blist li::before{content:'▸';position:absolute;left:0;font-size:9.5px;}
.pros .blist li::before{color:var(--ok);}
.cons .blist li::before{color:var(--danger);}

/* formulary */
.fsec{margin-top:11px;}
.ftitle{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);font-weight:700;margin-bottom:6px;}
.fgrid{display:flex;flex-wrap:wrap;gap:5px;}
.fpill{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;cursor:pointer;transition:all .15s;}
.fpill:hover{border-color:var(--accent);background:var(--accent-dim);}
.fpill.flash-pill{border-color:var(--ok)!important;background:var(--ok-dim)!important;}
.fcode{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--accent);}
.fname{font-size:11.5px;color:var(--text-soft);}
.fnote{font-size:9.5px;padding:1px 5px;border-radius:4px;background:var(--danger-dim);color:var(--danger);font-weight:700;}
.fnew{font-size:9.5px;padding:1px 5px;border-radius:4px;background:var(--ok-dim);color:var(--ok);font-weight:700;}
.no-f{font-size:11.5px;color:var(--text-muted);background:var(--surface2);border-radius:8px;padding:7px 11px;border-left:3px solid var(--border);}

/* info */
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
@media(max-width:500px){.igrid{grid-template-columns:1fr;}}
.ibox{background:var(--surface2);border-radius:9px;padding:11px;}
.ilabel{font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);font-weight:700;margin-bottom:3px;}
.ival{font-size:12.5px;color:var(--text);}
.doseval{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);font-weight:700;}
.titflow{background:var(--surface2);border-radius:9px;padding:12px;margin-bottom:10px;}
.tittitle{font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);font-weight:700;margin-bottom:8px;}
.titsteps{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.ts{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 10px;text-align:center;}
.ts .d{font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--accent);font-weight:700;}
.ts .n{font-size:9.5px;color:var(--text-muted);margin-top:1px;}
.tarr{color:var(--text-muted);font-size:12px;}

/* ekg */
.ekgsec{margin-bottom:11px;}
.ekgbar{background:var(--surface2);border-radius:9px;padding:12px;margin-bottom:8px;}
.ekghdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.ekgrl{font-size:11.5px;font-weight:600;color:var(--text-soft);}
.ekgitems{display:flex;flex-direction:column;gap:6px;}
.ekgi{display:flex;gap:8px;align-items:flex-start;}
.etag{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;min-width:54px;text-align:center;margin-top:1px;}
.qtc-tag{background:var(--warn-dim);color:var(--warn);border:1px solid rgba(217,119,6,.27);}
.pr-tag{background:rgba(124,58,237,.09);color:var(--snri);border:1px solid rgba(124,58,237,.27);}
.qrs-tag{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(220,38,38,.27);}
.edesc{font-size:12px;color:var(--text-soft);}

/* interactions */
.ilist{display:flex;flex-direction:column;gap:6px;}
.iitem{background:var(--surface2);border-radius:9px;padding:10px;display:flex;gap:8px;align-items:flex-start;}
.isev{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;min-width:48px;text-align:center;margin-top:1px;}
.sev-ci{background:var(--danger-dim);color:var(--danger);border:1px solid rgba(220,38,38,.28);}
.sev-high{background:var(--warn-dim);color:var(--warn);border:1px solid rgba(217,119,6,.28);}
.sev-mod{background:rgba(124,58,237,.09);color:var(--snri);border:1px solid rgba(124,58,237,.22);}
.ibody{flex:1;}
.idrug{font-size:12px;font-weight:700;color:var(--text);margin-bottom:1px;}
.imech{font-size:11px;color:var(--text-muted);}

/* CI */
.cilist{display:flex;flex-direction:column;gap:5px;}
.ciitem{background:var(--surface2);border-radius:7px;padding:8px 12px;display:flex;gap:8px;align-items:center;}
.ciicon{color:var(--danger);font-size:12px;flex-shrink:0;}
.citext{font-size:12px;color:var(--text-soft);}
.monlist{display:flex;flex-wrap:wrap;gap:5px;}
.monpill{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-size:11px;color:var(--text-soft);}

.notebox{background:rgba(2,132,199,.05);border:1px solid rgba(2,132,199,.17);border-radius:9px;padding:11px;margin-top:11px;}
.notebox .nl{font-size:9.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);font-weight:700;margin-bottom:3px;}
.notebox p{font-size:12px;color:var(--text-soft);}
.stitle{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);font-weight:700;margin:13px 0 6px;}
.stitle:first-child{margin-top:0;}

/* GUIDE */
#guideView{display:none;padding:13px 15px 32px;max-width:920px;margin:0 auto;}
#guideView.visible{display:block;}
.guide-header{background:linear-gradient(135deg,#0f766e 0%,#0369a1 100%);border-radius:var(--r);padding:18px 20px;margin-bottom:13px;color:#fff;}
.guide-header h2{font-family:'Outfit',sans-serif;font-size:18px;font-weight:900;margin-bottom:2px;}
.guide-header p{font-size:12px;opacity:.8;}
.ggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:9px;}
.gcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px;box-shadow:var(--sh);transition:box-shadow .2s,border-color .2s;}
.gcard:hover{box-shadow:var(--sh2);border-color:var(--border-strong);}
.gchdr{display:flex;align-items:center;gap:7px;margin-bottom:9px;}
.gicon{font-size:17px;}
.gctitle{font-size:12.5px;font-weight:700;color:var(--text);}
.gcsub{font-size:10.5px;color:var(--text-muted);margin-top:1px;}
.ranking{display:flex;flex-direction:column;gap:5px;}
.ritem{display:flex;align-items:center;gap:7px;background:var(--surface2);border-radius:7px;padding:5px 9px;}
.rnum{font-family:'JetBrains Mono',monospace;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--border);color:var(--text-muted);font-size:9.5px;font-weight:700;}
.rnum.r1{background:rgba(234,179,8,.2);color:#854d0e;}
.rnum.r2{background:rgba(148,163,184,.25);color:#475569;}
.rnum.r3{background:rgba(180,120,60,.15);color:#7c5a3a;}
.rdrug{font-size:12px;font-weight:600;color:var(--text);}
.rdrug.pref{color:var(--guide);font-weight:700;}
.rnote{font-size:10.5px;color:var(--text-muted);margin-left:auto;}
.gwarn{background:var(--danger-dim);border:1px solid rgba(220,38,38,.18);border-radius:8px;padding:9px 11px;display:flex;gap:8px;align-items:flex-start;}
.gwarn .wi{font-size:14px;flex-shrink:0;}
.gwarn .wt{font-size:12px;color:var(--danger);font-weight:700;}
.gwarn .wd{font-size:11px;color:var(--text-soft);margin-top:2px;}
.gsingle{display:flex;align-items:center;gap:9px;background:var(--surface2);border-radius:8px;padding:8px 11px;}
.gsl{font-size:11px;color:var(--text-muted);flex:1;}
.gsd{font-size:12.5px;font-weight:700;color:var(--guide);font-family:'JetBrains Mono',monospace;}
.greason{margin-top:6px;font-size:11px;color:var(--text-muted);padding:0 2px;}

/* legend */
.legend{display:flex;gap:9px;flex-wrap:wrap;padding:8px 15px;border-top:1px solid var(--border);background:var(--surface);position:sticky;bottom:0;box-shadow:0 -1px 4px rgba(0,0,0,.04);}
.li{display:flex;align-items:center;gap:4px;font-size:10.5px;color:var(--text-muted);}
.ld{width:7px;height:7px;border-radius:50%;}

/* toast */
#toast{position:fixed;bottom:54px;left:50%;transform:translateX(-50%) translateY(10px);background:#1e293b;color:#fff;font-size:12px;font-weight:600;padding:7px 15px;border-radius:20px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.empty{text-align:center;padding:50px 20px;color:var(--text-muted);}
.empty .big{font-size:38px;margin-bottom:10px;}
</style>
</head>
<body>
<div id="toast"></div>
<header>
  <div class="header-top">
    <a href="index.html" class="home-btn">🏠 홈</a>
    <div class="header-brand">
      <div class="header-title">항우울제 <span>임상참조</span></div>
      <div class="header-sub">Antidepressant Clinical Reference · 하남보바스병원 약제팀</div>
    </div>
    <div class="drug-count-badge" id="cntBadge">18 drugs</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="약품명·성분명·원내코드 검색… (예: escitalopram, LEXA, 미르타자핀)">
  </div>
  <div class="class-tabs">
    <button class="tab-btn active" data-class="ALL">전체</button>
    <button class="tab-btn" data-class="SSRI">SSRI</button>
    <button class="tab-btn" data-class="SNRI">SNRI</button>
    <button class="tab-btn" data-class="TCA">TCA</button>
    <button class="tab-btn" data-class="기타">기타</button>
    <button class="tab-btn" data-class="가이드">📋 임상 선택 가이드</button>
  </div>
</header>

<main id="drugList"></main>

<div id="guideView">
  <div class="guide-header">
    <h2>📋 임상 선택 가이드</h2>
    <p>증상·동반질환·부작용 프로필에 따른 항우울제 선택 참고표 — 하남보바스병원 약제팀</p>
  </div>
  <div class="ggrid" id="ggrid"></div>
</div>

<div class="legend">
  <div class="li"><div class="ld" style="background:var(--ok)"></div>EKG 저위험</div>
  <div class="li"><div class="ld" style="background:var(--warn)"></div>EKG 주의</div>
  <div class="li"><div class="ld" style="background:var(--danger)"></div>EKG 고위험</div>
  <div class="li"><div class="ld" style="background:var(--accent)"></div>원내코드 클릭=복사</div>
  <div class="li" style="margin-left:auto;font-size:10px">참고용 · 처방 시 확인 요망</div>
</div>

<script>
// ─── GUIDE DATA ───
const guideData = [
  { icon:'🍃', title:'성기능 장애가 적은 약', sub:'Sexual dysfunction — prefer', type:'ranking',
    items:[{drug:'Bupropion',note:'최소'},{drug:'Mirtazapine',note:'적음'},{drug:'Vortioxetine',note:'비교적 적음'}] },

// ─── GUIDE RENDER ───
function renderGuide() {
  document.getElementById('ggrid').innerHTML = guideData.map(g => {
    let body = '';
    if (g.type === 'ranking') {
      body = `<div class="ranking">${g.items.map((it,i)=>`
        <div class="ritem"><span class="rnum r${i+1}">${i+1}</span>
        <span class="rdrug">${it.drug}</span>
        <span class="rnote">${it.note}</span></div>`).join('')}</div>`;
    } else if (g.type === 'single') {
      body = `<div class="gsingle"><span class="gsl">선호 약물</span><span class="gsd">${g.preferred}</span></div>
              <div class="greason">${g.reason}</div>`;
    } else if (g.type === 'warning') {
      body = g.items.map(it=>`<div class="gwarn"><span class="wi">⚠️</span>
        <div><div class="wt">${it.label}</div><div class="wd">${it.detail}</div></div></div>`).join('<div style="height:5px"></div>');
    } else if (g.type === 'formulary') {
      body = `<div class="ranking">${g.items.map(it=>`
        <div class="ritem"><span class="rdrug pref">${it.drug}</span>
        <span class="rnote" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent)">${it.code}</span>
        <span style="font-size:9.5px;color:var(--text-muted);margin-left:3px">${it.note}</span></div>`).join('')}</div>`;
    }
    return `<div class="gcard"><div class="gchdr"><span class="gicon">${g.icon}</span>
      <div><div class="gctitle">${g.title}</div><div class="gcsub">${g.sub}</div></div></div>${body}</div>`;
  }).join('');
}

// ─── DRUG RENDER ───
let curFilter = 'ALL', searchTerm = '';

function ekgLabel(r) {
  return r==='low'?{cls:'ekg-low',label:'저위험'}:r==='mod'?{cls:'ekg-mod',label:'QT 주의'}:{cls:'ekg-high',label:'EKG ⚠️'};
}

function renderDrug(d) {
  const ekg = ekgLabel(d.ekgRisk);
  const hasF = d.formulary && d.formulary.length > 0;

  const pills = hasF ? d.formulary.map(f =>
    `<span class="hcp${f.note?' hcp-oos':f.isNew?' hcp-new':''}"
      onclick="cc('${f.code}',this,event)" title="${f.name} — 클릭하여 복사">${f.code}</span>`).join('') : '';

  const fblock = hasF
    ? `<div class="fsec"><div class="ftitle">🏥 원내 코드 — 클릭하면 코드가 복사됩니다</div>
        <div class="fgrid">${d.formulary.map(f=>`
          <div class="fpill${f.note?' discontinued':''}" onclick="cc('${f.code}',this,event)">
            <span class="fcode">${f.code}</span><span class="fname">${f.name}</span>
            ${f.isNew?'<span class="fnew">NEW</span>':''}${f.note?`<span class="fnote">${f.note}</span>`:''}
          </div>`).join('')}</div></div>`
    : `<div class="fsec"><div class="ftitle">🏥 원내 코드</div><div class="no-f">원내 미등재 약품입니다.</div></div>`;

  return `<div class="drug-card" data-class="${d.drugClass}" id="card-${d.id}">
  <div class="bar"></div>
  <div class="card-header" onclick="tog('${d.id}')">
    <span class="cls-badge badge-${d.drugClass}">${d.drugClass}</span>
    <div class="card-names">
      <div class="kor">${d.nameKor}</div>
      <div class="eng">${d.nameEng}</div>
      <div class="meta-row"><span class="brand">${d.brand}</span>${pills}</div>
    </div>
    <div class="card-right">
      <span class="ekgb ${ekg.cls}">${ekg.label}</span>
      <span class="chev">▶</span>
    </div>
  </div>
  <div class="card-body" id="body-${d.id}">
    <div class="itabs" id="tabs-${d.id}">
      <div class="itab active" onclick="st('${d.id}','ov',this)">개요</div>
      <div class="itab" onclick="st('${d.id}','dos',this)">용량/기간</div>
      <div class="itab" onclick="st('${d.id}','ekg',this)">EKG</div>
      <div class="itab" onclick="st('${d.id}','int',this)">상호작용</div>
      <div class="itab" onclick="st('${d.id}','ci',this)">금기/모니터링</div>
    </div>
    <div class="ipanel active" id="p-${d.id}-ov">
      <div class="pc">
        <div class="pros"><div class="btitle">✓ 장점</div><ul class="blist">${d.pros.map(p=>`<li>${p}</li>`).join('')}</ul></div>
        <div class="cons"><div class="btitle">✗ 단점</div><ul class="blist">${d.cons.map(c=>`<li>${c}</li>`).join('')}</ul></div>
      </div>
      ${fblock}
      ${d.note?`<div class="notebox"><div class="nl">📌 임상 참고</div><p>${d.note}</p></div>`:''}
    </div>
    <div class="ipanel" id="p-${d.id}-dos">
      <div class="titflow"><div class="tittitle">⬆ Titration 흐름</div>
        <div class="titsteps">${d.titration.map((s,i)=>`${i>0?'<span class="tarr">→</span>':''}<div class="ts"><div class="d">${s.dose}</div><div class="n">${s.note}</div></div>`).join('')}</div>
      </div>
      <div class="igrid">
        <div class="ibox"><div class="ilabel">유지 용량</div><div class="doseval">${d.maintenance}</div></div>
        <div class="ibox"><div class="ilabel">사용 기간</div><div class="ival" style="font-size:11.5px">${d.duration.split('.')[0]}</div></div>
      </div>
      <div class="ibox" style="margin-bottom:9px"><div class="ilabel">⬇ Tapering</div><div class="ival" style="font-size:12px;color:var(--text-soft)">${d.tapering}</div></div>
      <div class="ibox"><div class="ilabel">📅 사용 기간 상세</div><div class="ival" style="font-size:12px;color:var(--text-soft)">${d.duration}</div></div>
    </div>
    <div class="ipanel" id="p-${d.id}-ekg">
      <div class="ekgsec">
        <div class="ekgbar"><div class="ekghdr"><span class="ekgb ${ekg.cls}" style="font-size:11px;padding:3px 10px">EKG 위험도: ${ekg.label}</span><span class="ekgrl">${d.nameKor}</span></div>
          <div class="ekgitems">${d.ekg.items.map(it=>`<div class="ekgi"><span class="etag ${it.cls}">${it.tag}</span><span class="edesc">${it.desc}</span></div>`).join('')}</div>
        </div>
        <div class="notebox" style="background:rgba(217,119,6,.05);border-color:rgba(217,119,6,.18)">
          <div class="nl" style="color:var(--warn)">⚡ EKG 임상 원칙</div>
          <p>기저 QTc > 450ms (남) / 470ms (여): 주의 처방. QTc > 500ms: 원칙적 금기. QRS > 100ms (TCA): 독성 징후 즉시 평가. K⁺, Mg²⁺ 정상화 필수.</p>
        </div>
      </div>
    </div>
    <div class="ipanel" id="p-${d.id}-int">
      <div class="ilist">${d.interactions.map(it=>`<div class="iitem"><span class="isev ${it.cls}">${it.sev==='ci'?'금기':it.sev==='high'?'심각':'주의'}</span><div class="ibody"><div class="idrug">${it.drugs}</div><div class="imech">${it.mech}</div></div></div>`).join('')}</div>
    </div>
    <div class="ipanel" id="p-${d.id}-ci">
      <div class="stitle">🚫 금기 (Contraindications)</div>
      <div class="cilist">${d.contraindications.map(c=>`<div class="ciitem"><span class="ciicon">✕</span><span class="citext">${c}</span></div>`).join('')}</div>
      <div class="stitle">🔬 모니터링 항목</div>
      <div class="monlist">${d.monitoring.map(m=>`<span class="monpill">${m}</span>`).join('')}</div>
    </div>
  </div>
</div>`;
}

// ─── INTERACTIONS ───
function tog(id) { document.getElementById('card-'+id).classList.toggle('open'); }

function st(did, tab, el) {
  document.querySelectorAll(`#tabs-${did} .itab`).forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll(`[id^="p-${did}-"]`).forEach(p=>p.classList.remove('active'));
  document.getElementById(`p-${did}-${tab}`).classList.add('active');
}

function cc(code, el, ev) {
  if (ev) ev.stopPropagation();
  const done = () => {
    el.classList.add('flash','flash-pill');
    toast(`📋 "${code}" 복사됨`);
    setTimeout(()=>el.classList.remove('flash','flash-pill'), 1100);
  };
  navigator.clipboard ? navigator.clipboard.writeText(code).then(done).catch(()=>{fb(code);done();}) : (fb(code),done());
}

function fb(t) {
  const a=document.createElement('textarea');a.value=t;a.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);
}

function toast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);
}

function render() {
  const isGuide = curFilter === '가이드';
  const dl = document.getElementById('drugList');
  const gv = document.getElementById('guideView');
  dl.style.display = isGuide ? 'none' : '';
  gv.classList.toggle('visible', isGuide);
  if (isGuide) { document.getElementById('cntBadge').textContent = 'Guide'; return; }

  let list = drugs.filter(d => {
    const mc = curFilter === 'ALL' || d.drugClass === curFilter;
    const q = searchTerm.toLowerCase();
    const ms = !q || d.nameKor.includes(q) || d.nameEng.toLowerCase().includes(q)
      || d.brand.toLowerCase().includes(q)
      || (d.formulary && d.formulary.some(f=>f.code.toLowerCase().includes(q)||f.name.includes(q)));
    return mc && ms;
  });

  document.getElementById('cntBadge').textContent = list.length + ' drugs';
  dl.innerHTML = list.length
    ? list.map(renderDrug).join('')
    : `<div class="empty"><div class="big">🔍</div><p>검색 결과 없음: "${searchTerm}"</p></div>`;
}

document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); curFilter=b.dataset.class; render();
}));
document.getElementById('searchInput').addEventListener('input',e=>{searchTerm=e.target.value;render();});

renderGuide();
render();
</script>
</body>

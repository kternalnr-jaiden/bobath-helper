body {

  margin: 0;
  background: #f5f7fb;
}

h1 {
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

/* 앱 카드 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));

}

.card {

  padding: 25px;
  border-radius: 12px;
  text-align: center;
  text-decoration: none;
  color: black;
  font-size: 18px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

/* 오른쪽 바로가기 */
.shortcut-bar {
  position: fixed;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
}

.sc-btn {
  padding: 10px;
  margin: 3px;
  background: #ddd;
  text-decoration: none;
  font-size: 13px;
}

.sc-green { background: #c8f7c5; }
.sc-purple { background: #dcd0ff; }

/* 모바일 */
@media (max-width: 600px) {
  .shortcut-bar {
    position: static;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
  }
}
</style>
</head>
